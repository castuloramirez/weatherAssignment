spring.application.name=weather-api

# OpenWeather API
# The API key is read from the OPENWEATHER_API_KEY environment variable.
# Never commit a real key here — set the variable before running the app:
#   Mac/Linux:  export OPENWEATHER_API_KEY=your-key
#   Windows:    set OPENWEATHER_API_KEY=your-key
openweather.api.url=https://api.openweathermap.org/data/2.5
openweather.api.key=${OPENWEATHER_API_KEY}

# Cache: TTL 10 minutes, max 500 cities
cache.weather.ttl-minutes=10
cache.weather.max-size=500

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs